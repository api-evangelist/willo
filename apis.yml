aid: willo
url: https://raw.githubusercontent.com/api-evangelist/willo/refs/heads/main/apis.yml
name: Willo
kind: company
description: Willo is an asynchronous ("one-way") video interviewing and screening
  platform that lets teams invite candidates to record answers to pre-defined
  questions on any browser or device with no downloads, apps, or login required.
  The Willo Integration API V2 exposes the platform's UI actions as a public REST
  API so you can embed video interviewing into a job board, ATS, CRM, or staffing
  platform - managing Departments (Companies), Interviews (jobs and their
  questions), Participants (candidates) and their video Responses, Message
  Templates, Users, Webhooks, and Interview Templates. Authentication is by an
  integration key (API key) from the Willo Integrations page, sent in the
  Authorization header over HTTPS.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Video Interviewing
- Recruitment
- HR Tech
