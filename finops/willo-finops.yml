description: >-
  FinOps view of Willo spend. Willo is billed as a SaaS subscription (Growth,
  Scale, or custom Enterprise), not as a per-call metered API. The Willo
  Integration API V2 is included with a paid account - each user generates an
  integration key from the Integrations page - so API usage does not carry a
  separate line item; cost is driven by the subscription tier, seat count,
  assessment allowance, and any add-ons (ID check, right-to-work check,
  background check). Annual and multi-year prepay lower the effective monthly
  rate. Enterprise adds unlimited users/assessments, SSO, a formal OpenAPI file,
  and dedicated developer support under a negotiated contract.
notes: >-
  Per-unit API rates do not apply - Willo does not publish metered API pricing.
  The dominant cost drivers are the plan tier, number of seats, assessment
  volume, and optional verification add-ons. Verify current subscription prices
  and add-on rates on the Willo pricing page during reconciliation.
