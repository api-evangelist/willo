meters:
- name: subscription
  description: Recurring plan fee for the Willo tier (Growth, Scale, or Enterprise), billed monthly or annually.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: seats
  description: Number of users on the account, bounded by the plan (Growth up to 4, Scale up to 20, Enterprise unlimited).
  unit: seats
  aggregation: max
  dimensions:
  - account
  - plan
- name: assessments
  description: Assessments included with the plan (Growth 2, Scale 10, Enterprise unlimited).
  unit: assessments
  aggregation: max
  dimensions:
  - account
  - plan
- name: verification_addons
  description: Optional per-check add-ons such as ID check, right-to-work check, and background check.
  unit: checks
  aggregation: sum
  dimensions:
  - account
  - type
principles:
- name: Visibility
  description: Track the subscription tier, seat utilisation against the plan cap, and assessment consumption; monitor verification add-on volume separately.
- name: Allocation
  description: Use departments (Companies) and, for groups, child organisations to map interviewing spend to brands, geographies, or business units.
- name: Optimization
  description: Match the tier to hiring volume, right-size seats, prefer annual/multi-year prepay for the discount, and enable verification add-ons only where required.
- name: Accountability
  description: Assign an owner for the Willo account, review seat and assessment usage against the plan each cycle, and reconcile add-on charges.
