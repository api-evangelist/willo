actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Willo's own API. The public Willo
    Integration API V2 is request/response REST, and Willo's event delivery is
    handled by outbound webhooks rather than a server-push socket. No AsyncAPI
    document was created because there is no bidirectional or streaming WebSocket
    transport to model; the webhook triggers are recorded in this review and in
    the Webhooks resource of the OpenAPI.
