aid: willo
name: Willo
review:
  question: Does Willo expose a documented public WebSocket API?
  answer: false
  date: '2026-07-10'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Willo's public developer surface - the
    Willo Integration API V2 - is request/response REST over HTTPS. Willo's
    real-time / event story is delivered by outbound webhooks (New Response,
    Stage Change, New Comment, New Score), which POST an event payload to a
    third-party HTTPS endpoint. There is no server-push WebSocket (ws:// or
    wss://) transport documented on Willo's own API to model, so no AsyncAPI
    document was created. The webhook triggers are captured in the review and
    in the Webhooks resource of the OpenAPI instead.
findings:
  summary: |
    Willo does not publish a documented public WebSocket API. Willo is an
    asynchronous ("one-way") video interviewing platform. Its public API is the
    Willo Integration API V2, a REST API at
    https://api.willotalent.com/api/integrations/v2 (staging at
    https://api.stage.willotalent.com/api/integrations/v2). Authentication is by
    an integration key ("API key") sent in the Authorization header; each user
    has their own key, issued and cycled on the Willo Integrations page
    (https://app.willotalent.com/integrations). All calls must be over HTTPS.
    The API is pure request/response REST covering Departments, Interviews,
    Participants (candidates) and their responses / IDV media, Message Templates,
    Users, Webhooks, Interview Templates, Child Organisations, plus Languages and
    IDV-country reference lists. Change notifications are delivered by outbound
    webhooks, not by a bidirectional or streaming socket. No ws:// or wss://
    endpoint is documented anywhere in Willo's API reference.
  accessModel: |
    The API reference is public and self-serve: the full Postman documentation
    (documenter.getpostman.com/view/7798010/VUjSEiSn) is openly readable and an
    integration key is generated from a Willo account's Integrations page. Willo
    markets the API broadly ("thousands of organisations use the Willo API").
    Practically, deeper API use is tier-gated: Willo's pricing lists a formal
    OpenAPI file, SSO, dedicated developer support, and longer data retention as
    Enterprise-plan features, while paid self-serve plans (Growth, Scale) provide
    the account and integration key. Endpoint paths, methods, auth, status codes,
    and webhook triggers are confirmed from the published reference; request and
    response body schemas in the OpenAPI here are modeled from Willo's documented
    resource glossary and marked illustrative.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.willotalent.com/api/integrations/v2
      documented: true
      note: Willo Integration API V2. Staging base is https://api.stage.willotalent.com/api/integrations/v2.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Outbound event notifications (new response, stage change, new comment, new score) POSTed to a third-party endpoint. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Willo's Integration API V2 reference as of the review date.
  authentication:
    scheme: API Key
    header: Authorization
    note: Integration key from the Willo Integrations page; each user has their own key with that user's permissions.
  webhookTriggers:
    - name: New Response
      note: A new interview response is received from a participant.
    - name: Stage Change
      note: A participant is moved to a different stage on the Willo Kanban board.
    - name: New Comment
      note: A participant receives a comment from a member of the hiring team.
    - name: New Score
      note: A participant receives a score from a member of the hiring team.
  statusCodes:
    - '200 OK'
    - '201 Created'
    - '400 Bad Request'
    - '401 Unauthorised'
    - '403 Forbidden'
    - '404 Not Found'
    - '429 Too Many Requests'
