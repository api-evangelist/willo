specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Willo
providerId: willo
created: '2026-07-10'
modified: '2026-07-10'
reconciled: false
tags:
- Video Interviewing
- Recruitment
- HR Tech
- Plans
description: >-
  Willo sells the platform (not the API by itself) on published monthly and
  annual subscription tiers - Growth, Scale, and a custom Enterprise plan - plus
  a 50% non-profit discount. A Willo account provides the Integrations page where
  each user generates an integration key ("API key") for the Willo Integration
  API V2. Some deeper developer features are tier-gated: Willo's pricing page
  lists a formal OpenAPI file, SSO, dedicated developer support, and 12+ month
  data retention as Enterprise-plan features, while Growth and Scale provide the
  account, integration key, and integrations. Prices below are grounded from the
  Willo pricing page (USD headline shown; Willo also quotes GBP, EUR, and AUD).
  Confirm current numbers during reconciliation.
notes: >-
  The API itself has no separate metered fee documented; access follows the
  account subscription. Annual and multi-year billing lowers the effective
  monthly rate (Willo advertises 3 months free on 1- or 2-year prepay). Verify
  seat counts, assessment allowances, and which developer features (OpenAPI file,
  developer support) require Enterprise on the live pricing page.
sources:
- https://www.willo.video/pricing
- https://www.willo.video/api
- https://documenter.getpostman.com/view/7798010/VUjSEiSn
