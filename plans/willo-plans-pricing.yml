    name: growth_monthly
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    currency: USD
    price: '279'
    userMultiplied: false
  - label: Subscription (Annual, per month)
    name: growth_annual
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    currency: USD
    price: '209'
    userMultiplied: false
